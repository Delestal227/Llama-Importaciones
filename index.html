<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Llama Importaciones - Actualizando</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #FAFAFA;
            color: #1A1A1A;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            padding: 2rem;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        h1 { color: #E67E22; font-size: 2.5rem; margin-bottom: 0.5rem; }
        p { color: #8E8E8E; font-size: 1.1rem; }
        .spinner {
            border: 4px solid rgba(230, 126, 34, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #E67E22;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <h1>Llama Importaciones</h1>
        <p>Estamos migrando a nuestra nueva plataforma premium.</p>
        <div class="spinner"></div>
        <p style="font-size: 0.8rem; opacity: 0.7;">Vuelve a intentar en unos minutos.</p>
    </div>
</body>
</html>
